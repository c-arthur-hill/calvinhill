<!doctype html>
<html>
	<head>
        <title>Calvin Hill</title>
        {% load static %}
        {% load compress %}
        {% compress css %}
            <link type="text/x-scss" href="{% static 'theme.scss' %}" rel="stylesheet" media="screen">
        {% endcompress %}
        <link rel="stylesheet" href="{% static 'css/app.css' %}">
       {% block head %}{% endblock %}
	</head>
	<body class="rounded-0">
        <div class="bg-light">
            <div class="container">
                <nav class="navbar navbar-expand-lg navbar-light">
                    <a class="navbar-brand display" href="#">Calvin Hill</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link" href="#">About</a>
                            </li>
                        </ul>
                        <form class="d-flex" role="search">
                            <input class="form-control me-2 form-control-sm" type="search" placeholder="Search" aria-label="Search">
                            <button class="btn btn-outline-secondary btn-sm" type="submit">Search</button>
                        </form>
                    </div>
                </nav>
            </div>
        </div>
        <div class="container mt-3">
            {% block content %}{%endblock %}
        </div>
	</body>
</html>
